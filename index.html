<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca & Phrase Cloud v3.9</title>
    <style>
        :root { --main: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --accent: #00b894; --warn: #d63031; --phrase: #fdcb6e; }
        body { font-family: 'Pretendard', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        .tab-menu { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { cursor: pointer; font-weight: bold; color: #aaa; padding: 10px 5px; }
        .tab.active { color: var(--main); border-bottom: 3px solid var(--main); }

        .input-style { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; transition: border 0.2s; }
        .input-style:focus { border-color: var(--main); }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-main  { background: var(--main);  color: white; }
        .btn-today { background: #ff7675;       color: white; }
        .btn-sub   { background: #81ecec;       color: #2d3436; }

        /* ── MODAL STRUCTURE ── */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            width: 90%; max-width: 480px;
            height: 85vh;
            overflow: hidden;
            z-index: 2000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            flex-direction: column;
        }
        .modal.open { display: flex; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px 14px;
            border-bottom: 2px solid #f0f0f0;
            flex-shrink: 0;
            background: white;
        }
        .modal-header h3 { margin: 0; font-size: 1.1em; }
        .modal-close-btn { border: none; background: none; font-size: 26px; cursor: pointer; color: #aaa; line-height: 1; padding: 0 4px; transition: color 0.2s; }
        .modal-close-btn:hover { color: var(--warn); }

        .modal-body { overflow-y: auto; flex: 1; padding: 20px 25px 25px; }

        .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay-bg.open { display: block; }

        /* List items */
        .item-card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #efefef; position: relative; }
        .delete-btn { position: absolute; right: 15px; top: 15px; color: #d63031; cursor: pointer; font-size: 18px; }

        .dict-links { margin: 10px 0; }
        .dict-links a { font-size: 0.85em; color: var(--main); margin-right: 12px; text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--main); }

        #filterResults { margin-top: 5px; max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; display: none; background: #fff; padding: 10px; }

        .choice-btn { width: 100%; text-align: left; padding: 14px; margin-top: 8px; border: 2px solid #f0f0f0; border-radius: 12px; background: white; cursor: pointer; font-size: 15px; transition: 0.15s; }
        .choice-btn:hover:not(:disabled) { border-color: var(--main); background: #f5f3ff; }
        .choice-btn.correct { border-color: var(--accent) !important; background: #e8f8f5 !important; color: var(--accent); font-weight: bold; }
        .choice-btn.wrong   { border-color: var(--warn)  !important; background: #fff5f5 !important; color: var(--warn); }

        .quiz-progress { background: #eee; border-radius: 10px; height: 6px; margin-bottom: 10px; overflow: hidden; }
        .quiz-progress-fill { background: var(--main); height: 100%; border-radius: 10px; transition: width 0.4s; }

        .result-screen { text-align: center; padding: 10px 0; }
        .result-score  { font-size: 3em; font-weight: bold; color: var(--main); margin: 10px 0; }
        .error-item    { background: #fff5f5; border: 1px solid #ffcccc; border-radius: 10px; padding: 12px 15px; margin-bottom: 8px; text-align: left; }
        .error-item b  { color: var(--warn); }
        .error-item small { color: #777; display: block; margin-top: 3px; }

        #undoBar { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 15px 25px; border-radius: 30px; z-index: 3000; white-space: nowrap; }

        .sync-badge { font-size: 0.7em; padding: 3px 8px; border-radius: 20px; background: #dfe6e9; color: #636e72; margin-left: 8px; vertical-align: middle; }
        .sync-badge.live { background: #d4efdf; color: #1e8449; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; align-items:center; margin-bottom:5px;">
        <span style="font-size:1.3em; font-weight:800; color:var(--main);">Voca Cloud</span>
        <span class="sync-badge" id="syncBadge">localStorage</span>
    </div>

    <div class="tab-menu">
        <div class="tab active" id="tab-word"   onclick="switchTab('word')">Word Mode</div>
        <div class="tab"        id="tab-phrase" onclick="switchTab('phrase')">Phrase Mode</div>
    </div>

    <!-- ── WORD SECTION ── -->
    <div id="wordSection">
        <div style="display:flex; gap:8px;">
            <input type="text" id="wordInput" class="input-style" placeholder="Search or filter saved words..." oninput="realTimeFilter(this.value)">
            <button onclick="fetchApiData()" class="btn btn-main">Search</button>
        </div>
        <div id="filterResults"></div>

        <div id="searchResult" style="display:none; background:#f9f9ff; padding:15px; border-radius:15px; margin-top:15px; border:1px solid var(--main);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="resWord" style="margin:0;"></h3>
                <span id="resPhonetic" style="color:var(--accent);"></span>
            </div>
            <div class="dict-links" id="dictLinks"></div>
            <textarea id="resMeaning" class="input-style" rows="2" placeholder="English Definition"></textarea>
            <input type="text" id="resKorean" class="input-style" placeholder="Korean meaning (Optional)">
            <button id="saveBtn" class="btn btn-main" style="width:100%;">Save Word</button>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <!-- ✅ RENAMED BUTTONS -->
            <button onclick="startQuiz('total','choice')" class="btn btn-main">📚 All Words Quiz</button>
            <button onclick="startQuiz('total','spell')"  class="btn btn-main">✏️ All Words Spell</button>
            <button onclick="startQuiz('today','choice')" class="btn btn-today">📅 Today's Quiz</button>
            <button onclick="startQuiz('today','spell')"  class="btn btn-today">📅 Today's Spell</button>
            <button onclick="openList('word','recent')"   class="btn btn-sub">🕐 By Recent</button>
            <button onclick="openList('word','abc')"      class="btn btn-sub">🔤 By A–Z</button>
        </div>
    </div>

    <!-- ── PHRASE SECTION ── -->
    <div id="phraseSection" style="display:none;">
        <input type="text" id="phraseInput"       class="input-style" placeholder="English Phrase">
        <input type="text" id="phraseMeaningInput" class="input-style" placeholder="Meaning">
        <button onclick="savePhrase()" class="btn btn-main" style="width:100%; background:var(--phrase); color:#2d3436; margin-bottom:15px;">Save Phrase</button>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button onclick="startPhraseReview()" class="btn btn-sub" style="background:var(--phrase);">Phrase Review</button>
            <button onclick="openList('phrase','recent')" class="btn btn-sub" style="background:#dfe6e9;">View All</button>
        </div>
    </div>
</div>

<div id="undoBar">Deleted. <span onclick="undoDelete()" style="text-decoration:underline; cursor:pointer; margin-left:10px; color:var(--phrase);">UNDO</span></div>

<div class="overlay-bg" id="overlayBg" onclick="closeModal()"></div>
<div class="modal" id="commonModal">
    <div class="modal-header">
        <h3 id="modalTitle">–</h3>
        <button class="modal-close-btn" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalContent"></div>
</div>

<!-- Firebase (loads async — app works without it) -->
<script>
// ══════════════════════════════════════════════════════
//  DATA LAYER  — localStorage first, Firebase sync when available
// ══════════════════════════════════════════════════════
let words = [], phrases = [], lastDeleted = null;
const LS_WORDS   = 'voca_words';
const LS_PHRASES = 'voca_phrases';

function loadLocal() {
    try { words   = JSON.parse(localStorage.getItem(LS_WORDS))   || []; } catch(e) { words   = []; }
    try { phrases = JSON.parse(localStorage.getItem(LS_PHRASES)) || []; } catch(e) { phrases = []; }
}
function saveLocal() {
    localStorage.setItem(LS_WORDS,   JSON.stringify(words));
    localStorage.setItem(LS_PHRASES, JSON.stringify(phrases));
}
loadLocal();

// ── Try to hook up Firebase (silently skip if unavailable) ──
function initFirebase() {
    const cfg = {
        apiKey: "AIzaSyCTVfsVWULs99Tgind1z_wqbjCJPI63Esg",
        authDomain: "my-eng-word.firebaseapp.com",
        databaseURL: "https://my-eng-word-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-eng-word",
        storageBucket: "my-eng-word.firebasestorage.app",
        messagingSenderId: "216506701187",
        appId: "1:216506701187:web:b814513e64777b35fc12b6"
    };
    try {
        firebase.initializeApp(cfg);
        const db = firebase.database();
        db.ref('words/').on('value', snap => {
            const val = snap.val();
            words = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
            saveLocal();
        });
        db.ref('phrases/').on('value', snap => {
            const val = snap.val();
            phrases = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
            saveLocal();
        });
        document.getElementById('syncBadge').textContent = '🔴 Firebase Live';
        document.getElementById('syncBadge').classList.add('live');
        window._db = db;
    } catch(e) { /* Firebase not available — localStorage only */ }
}

function dbPush(path, data) {
    if (window._db) {
        return window._db.ref(path).push(data);
    }
    // localStorage fallback
    const id = 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const item = { id, ...data };
    if (path.startsWith('words'))   { words.push(item);   saveLocal(); }
    if (path.startsWith('phrases')) { phrases.push(item); saveLocal(); }
    return Promise.resolve({ key: id });
}

function dbRemove(path, id) {
    if (window._db) return window._db.ref(`${path}/${id}`).remove();
    if (path === 'words')   { words   = words.filter(w => w.id !== id);   saveLocal(); }
    if (path === 'phrases') { phrases = phrases.filter(p => p.id !== id); saveLocal(); }
    return Promise.resolve();
}

// Load Firebase SDK dynamically
const fbScript1 = document.createElement('script');
fbScript1.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
fbScript1.onload = () => {
    const fbScript2 = document.createElement('script');
    fbScript2.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js';
    fbScript2.onload = initFirebase;
    document.head.appendChild(fbScript2);
};
fbScript1.onerror = () => { /* stay on localStorage */ };
document.head.appendChild(fbScript1);

// ══════════════════════════════════════════════════════
//  SPEECH
// ══════════════════════════════════════════════════════
function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════
function switchTab(t) {
    document.getElementById('wordSection').style.display   = t === 'word'   ? 'block' : 'none';
    document.getElementById('phraseSection').style.display = t === 'phrase' ? 'block' : 'none';
    document.getElementById('tab-word').classList.toggle('active', t === 'word');
    document.getElementById('tab-phrase').classList.toggle('active', t === 'phrase');
}

// ══════════════════════════════════════════════════════
//  SEARCH & FILTER
// ══════════════════════════════════════════════════════
function realTimeFilter(val) {
    const area = document.getElementById('filterResults');
    if (!val.trim()) { area.style.display = 'none'; return; }
    const matches = words.filter(w => w.word && w.word.toLowerCase().includes(val.toLowerCase()));
    if (!matches.length) { area.style.display = 'none'; return; }
    area.style.display = 'block';
    area.innerHTML = matches.map(m =>
        `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="speak('${m.word}')">
            <b>${m.word}</b>: ${m.korean || (m.meaning||'').substring(0,30)}...
         </div>`
    ).join('');
}

async function fetchApiData() {
    const val = document.getElementById('wordInput').value.trim();
    if (!val) return;
    try {
        const res  = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${val}`);
        const data = await res.json();
        if (!data.title) {
            document.getElementById('searchResult').style.display = 'block';
            document.getElementById('resWord').innerText     = val;
            document.getElementById('resPhonetic').innerText = data[0].phonetic || '';
            document.getElementById('resMeaning').value      = data[0].meanings[0].definitions[0].definition;
            document.getElementById('dictLinks').innerHTML   =
                `<a href="https://dictionary.cambridge.org/dictionary/english/${val}" target="_blank">Cambridge ↗</a>
                 <a href="https://en.dict.naver.com/#/search?query=${val}" target="_blank">Naver ↗</a>`;
            speak(val);
        } else {
            alert('Word not found in dictionary.');
        }
    } catch(e) { alert('Network error. Please check your connection.'); }
}
document.getElementById('wordInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchApiData(); });

document.getElementById('saveBtn').onclick = () => {
    dbPush('words/', {
        word:      document.getElementById('resWord').innerText,
        meaning:   document.getElementById('resMeaning').value,
        korean:    document.getElementById('resKorean').value,
        phonetic:  document.getElementById('resPhonetic').innerText,
        timestamp: Date.now()
    });
    document.getElementById('searchResult').style.display = 'none';
    document.getElementById('wordInput').value = '';
    document.getElementById('filterResults').style.display = 'none';
};

function savePhrase() {
    const p = document.getElementById('phraseInput').value.trim();
    const m = document.getElementById('phraseMeaningInput').value.trim();
    if (!p) return;
    dbPush('phrases/', { phrase: p, meaning: m, timestamp: Date.now() });
    document.getElementById('phraseInput').value = '';
    document.getElementById('phraseMeaningInput').value = '';
}

// ══════════════════════════════════════════════════════
//  QUIZ  — 20-question limit + error review & re-quiz
// ══════════════════════════════════════════════════════
const QUIZ_LIMIT = 20;
let currentPool = [], currentStyle = '', currentQuizWord = null;
let questionCount = 0, correctCount = 0, wrongCount = 0;
let wrongLog = [];
let reQuizMode = false, reQuizLimit = 0;

function startQuiz(type, style) {
    const pool = type === 'today'
        ? words.filter(w => w.timestamp > new Date().setHours(0,0,0,0))
        : [...words];
    if (!pool.length) { alert('No words found.'); return; }

    currentPool   = pool;
    currentStyle  = style;
    questionCount = 0;
    correctCount  = 0;
    wrongLog      = [];
    reQuizMode    = false;

    showModal('Quiz');
    nextQuestion();
}

function nextQuestion() {
    const limit = reQuizMode ? reQuizLimit : QUIZ_LIMIT;
    if (questionCount >= limit) { showQuizResult(); return; }
    if (!currentPool.length) { showQuizResult(); return; }

    currentQuizWord = currentPool[Math.floor(Math.random() * currentPool.length)];
    wrongCount = 0;
    questionCount++;
    renderQuiz();
}

function renderQuiz() {
    const limit = reQuizMode ? reQuizLimit : QUIZ_LIMIT;
    const pct   = Math.round((questionCount / limit) * 100);
    const qText = currentQuizWord.meaning || 'No definition available.';
    const hint  = currentQuizWord.korean
        ? `<div style="color:var(--main); margin-top:8px; font-size:0.9em;">🇰🇷 ${currentQuizWord.korean}</div>`
        : '';

    let html = `
        <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <div style="text-align:right; font-size:0.82em; color:#aaa; margin-bottom:12px;">
            ${questionCount} / ${limit} &nbsp;|&nbsp; ✅ ${correctCount} &nbsp;❌ ${wrongLog.length}
        </div>
        <div style="background:#f5f3ff; border-radius:14px; padding:16px 18px; margin-bottom:16px;">
            <div style="font-size:0.75em; color:#aaa; font-weight:700; letter-spacing:1px; margin-bottom:6px;">DEFINITION</div>
            <div style="font-size:1.15em; font-weight:700; line-height:1.6;">${qText}</div>
            ${hint}
        </div>`;

    if (currentStyle === 'choice') {
        let choices = [currentQuizWord.word];
        const pool  = words.length >= 4 ? words : currentPool;
        let tries   = 0;
        while (choices.length < 4 && tries < 50) {
            const rw = pool[Math.floor(Math.random() * pool.length)].word;
            if (rw && !choices.includes(rw)) choices.push(rw);
            tries++;
        }
        choices.sort(() => Math.random() - 0.5).forEach(c => {
            const safeC = c.replace(/'/g, "\\'");
            html += `<button class="choice-btn" id="cbtn-${c.replace(/\s/g,'_')}" onclick="checkAnswer('${safeC}', this)">${c}</button>`;
        });
    } else {
        html += `
            <input type="text" id="qInput" class="input-style" placeholder="Type the spelling..." autocomplete="off">
            <button class="btn btn-main" style="width:100%;" onclick="checkAnswer()">Submit</button>`;
    }

    html += `<button onclick="closeModal()" class="btn" style="width:100%; margin-top:18px; background:#eee; color:#777;">Stop Quiz</button>`;
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalTitle').innerText = reQuizMode ? '🔁 Re-Quiz' : 'Quiz';

    if (currentStyle === 'spell') {
        const inp = document.getElementById('qInput');
        if (inp) { inp.focus(); inp.onkeydown = e => { if (e.key === 'Enter') checkAnswer(); }; }
    }
}

function checkAnswer(val, btnEl) {
    const ans     = (val || (document.getElementById('qInput') ? document.getElementById('qInput').value : '')).trim().toLowerCase();
    const correct = currentQuizWord.word.toLowerCase();

    if (ans === correct) {
        correctCount++;
        speak(currentQuizWord.word);
        if (btnEl) {
            btnEl.classList.add('correct');
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            setTimeout(nextQuestion, 750);
        } else {
            setTimeout(nextQuestion, 300);
        }
    } else {
        wrongCount++;
        if (!wrongLog.find(w => w.word === currentQuizWord.word)) {
            wrongLog.push({ word: currentQuizWord.word, meaning: currentQuizWord.meaning, korean: currentQuizWord.korean || '' });
        }
        if (btnEl) btnEl.classList.add('wrong');

        if (wrongCount >= 2) {
            // Reveal correct answer
            const correctBtn = document.getElementById('cbtn-' + currentQuizWord.word.replace(/\s/g,'_'));
            if (correctBtn) correctBtn.classList.add('correct');
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            const inp = document.getElementById('qInput');
            if (inp) { inp.value = currentQuizWord.word; inp.style.color = 'var(--warn)'; inp.disabled = true; }
            speak(currentQuizWord.word);
            setTimeout(nextQuestion, 1300);
        } else {
            // Show hint inline
            const existing = document.querySelector('.hint-msg');
            if (existing) existing.remove();
            const hintEl = document.createElement('div');
            hintEl.className = 'hint-msg';
            hintEl.style.cssText = 'color:var(--warn); font-size:0.88em; font-weight:600; margin:8px 0;';
            hintEl.innerText = `❌ Wrong! Hint: starts with "${currentQuizWord.word[0].toUpperCase()}"`;
            const body = document.getElementById('modalContent');
            const ref  = body.querySelector('.choice-btn') || body.querySelector('#qInput');
            if (ref) body.insertBefore(hintEl, ref); else body.appendChild(hintEl);
        }
    }
}

function showQuizResult() {
    const total    = reQuizMode ? reQuizLimit : QUIZ_LIMIT;
    const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;
    document.getElementById('modalTitle').innerText = 'Result';

    let html = `
        <div class="result-screen">
            <div style="font-size:2.5em;">🎯</div>
            <h2 style="margin:8px 0;">Quiz Finished!</h2>
            <div class="result-score">${correctCount} / ${total}</div>
            <div style="color:#aaa; margin-bottom:20px;">Accuracy: <b style="color:var(--main);">${accuracy}%</b></div>`;

    if (wrongLog.length === 0) {
        html += `<div style="color:var(--accent); font-size:1.2em; font-weight:bold; margin-bottom:20px;">🏆 Perfect! No mistakes!</div>`;
    } else {
        html += `
            <div style="text-align:left; margin-bottom:15px;">
                <div style="font-weight:700; color:var(--warn); margin-bottom:10px;">❌ Words to review (${wrongLog.length})</div>
                ${wrongLog.map(w => `
                    <div class="error-item">
                        <b>${w.word}</b>
                        <small>${w.meaning}</small>
                        ${w.korean ? `<small style="color:var(--main);">🇰🇷 ${w.korean}</small>` : ''}
                    </div>`).join('')}
            </div>
            <button class="btn btn-today" style="width:100%; margin-bottom:10px;" onclick="startReQuiz()">
                🔁 Re-quiz Wrong Answers (${wrongLog.length})
            </button>`;
    }
    html += `<button onclick="closeModal()" class="btn" style="width:100%; background:#eee; color:#777;">Close</button></div>`;
    document.getElementById('modalContent').innerHTML = html;
}

function startReQuiz() {
    if (!wrongLog.length) return;
    currentPool   = wrongLog.map(w => ({ ...w, timestamp: Date.now() }));
    questionCount = 0;
    correctCount  = 0;
    reQuizMode    = true;
    reQuizLimit   = currentPool.length;
    wrongLog      = [];
    nextQuestion();
}

// ══════════════════════════════════════════════════════
//  PHRASE REVIEW
// ══════════════════════════════════════════════════════
function startPhraseReview() {
    if (!phrases.length) { alert('No phrases saved yet.'); return; }
    showModal('Phrase Review');
    nextPhrase();
}

function nextPhrase() {
    const p = phrases[Math.floor(Math.random() * phrases.length)];
    const safe = (p.phrase || '').replace(/'/g, '');
    document.getElementById('modalContent').innerHTML = `
        <div style="text-align:center; padding:10px;">
            <h2 style="color:var(--main); margin-bottom:8px;">${p.phrase}</h2>
            <p style="font-size:1.1em; color:#555; margin-bottom:20px;">${p.meaning}</p>
            <button class="btn btn-main" style="width:100%;" onclick="speak('${safe}')">🔊 Listen</button>
            <button class="btn btn-sub" style="width:100%; margin-top:10px; background:var(--phrase);" onclick="nextPhrase()">Next ➔</button>
        </div>`;
    speak(p.phrase);
}

// ══════════════════════════════════════════════════════
//  WORD / PHRASE LIST
// ══════════════════════════════════════════════════════
function openList(mode, sort) {
    let data = mode === 'word' ? [...words] : [...phrases];
    if (sort === 'abc') data.sort((a,b) => (a.word||a.phrase||'').localeCompare(b.word||b.phrase||''));
    else data.sort((a,b) => b.timestamp - a.timestamp);

    if (!data.length) {
        showModal(mode === 'word' ? '📚 Word List' : '📝 Phrase List');
        document.getElementById('modalContent').innerHTML = `<div style="text-align:center; color:#aaa; padding:40px 0;">Nothing saved yet.</div>`;
        return;
    }

    let html = data.map(item => {
        const display = item.word || item.phrase || '';
        const sub     = item.korean || item.meaning || '';
        const safe    = display.replace(/'/g, '');
        return `<div class="item-card">
            <span class="delete-btn" onclick="softDelete('${mode}','${item.id}')">🗑</span>
            <b style="cursor:pointer;" onclick="speak('${safe}')">${display} 🔊</b>
            <br><small style="color:#777; margin-top:4px; display:block;">${sub}</small>
        </div>`;
    }).join('');

    showModal(`${mode === 'word' ? '📚' : '📝'} ${data.length} ${mode === 'word' ? 'Words' : 'Phrases'}`);
    document.getElementById('modalContent').innerHTML = html;
}

// ══════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════
function showModal(title = '') {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('commonModal').classList.add('open');
    document.getElementById('overlayBg').classList.add('open');
    document.getElementById('modalContent').scrollTop = 0;
}

function closeModal() {
    document.getElementById('commonModal').classList.remove('open');
    document.getElementById('overlayBg').classList.remove('open');
}

// ══════════════════════════════════════════════════════
//  DELETE / UNDO
// ══════════════════════════════════════════════════════
function softDelete(mode, id) {
    const target = mode === 'word'
        ? words.find(w => w.id === id)
        : phrases.find(p => p.id === id);
    if (!target) return;
    lastDeleted = { mode, id, data: { ...target } };

    dbRemove(mode === 'word' ? 'words' : 'phrases', id).then(() => {
        // Also update local array immediately if no Firebase
        if (!window._db) {
            if (mode === 'word')   words   = words.filter(w => w.id !== id);
            if (mode === 'phrase') phrases = phrases.filter(p => p.id !== id);
            saveLocal();
        }
    });

    document.getElementById('undoBar').style.display = 'block';
    setTimeout(() => document.getElementById('undoBar').style.display = 'none', 5000);
    closeModal();
}

function undoDelete() {
    if (!lastDeleted) return;
    dbPush(lastDeleted.mode === 'word' ? 'words/' : 'phrases/', lastDeleted.data);
    lastDeleted = null;
    document.getElementById('undoBar').style.display = 'none';
}
</script>
</body>
</html>
