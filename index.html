<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Voca Cloud - Enter to Submit</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --accent: #00b894; --warn: #d63031; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        #authOverlay { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify(content: center; align-items: center; z-index: 3000; }
        .input-style { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .input-style:focus { border-color: var(--main); outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--main); color: white; }
        .btn-sub { background: #81ecec; color: #2d3436; }
        .btn-today { background: #ff7675; color: white; }

        #searchResult { background: #f9f9ff; padding: 20px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #e0e0ff; }
        .link-tag { font-size: 12px; padding: 6px 10px; background: #eee; border-radius: 6px; text-decoration: none; color: var(--main); font-weight: bold; border: 1px solid #ddd; }

        /* Modal Styles */
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:20px; width:90%; max-width:480px; height: 85vh; overflow-y: auto; z-index:2000; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .modal-header { position: sticky; top: -25px; background: white; padding: 15px 0; border-bottom: 1px solid #eee; z-index: 10; margin-bottom: 15px; }
        .close-x { position: absolute; right: 0; top: 10px; font-size: 24px; cursor: pointer; color: #aaa; border: none; background: none; }
        .close-x:hover { color: var(--warn); }
        
        .word-item { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #efefef; display: flex; justify-content: space-between; align-items: center; }
        .word-item b { color: var(--main); font-size: 1.1em; }
        .word-item .kor-txt { color: #2d3436; font-weight: 800; margin-right: 5px; }
        .word-item small { color: #636e72; display: block; margin-top: 3px; font-size: 0.85em; }

        .overlay-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h2>🔒 Access Pin</h2>
    <input type="password" id="pwInput" class="input-style" style="width:200px; text-align:center" placeholder="Password">
    <button id="loginBtn" class="btn btn-main" style="margin-top:15px; width:200px;">Connect</button>
</div>

<div class="container" id="mainApp" style="display:none;">
    <h2 style="text-align:center; color: var(--main); margin-top:0;">My Voca Cloud</h2>
    
    <div style="display:flex; gap:8px; margin-bottom:20px;">
        <input type="text" id="wordInput" class="input-style" placeholder="Search Word (English)">
        <button id="searchBtn" class="btn btn-main">Search</button>
    </div>

    <div id="searchResult">
        <h3 id="resWord" style="margin:0; color:var(--main)"></h3>
        <div id="externalLinks" style="margin: 10px 0; display: flex; flex-wrap: wrap; gap: 5px;"></div>
        <textarea id="resMeaning" class="input-style" rows="3" style="margin-bottom:10px; resize:none; font-size:14px;"></textarea>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="text" id="resKorean" class="input-style" placeholder="Korean Meaning">
            <button id="naverBtn" class="btn" style="background:#03cf5d; color:white;">Naver</button>
        </div>
        <button id="saveBtn" class="btn btn-main" style="width:100%;">Save to List</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
        <button id="startQuizBtn" class="btn btn-main">All Quiz</button>
        <button id="todayQuizBtn" class="btn btn-today">Today's Quiz</button>
        <button id="viewAllBtn" class="btn btn-sub">View All Words</button>
        <button id="viewTodayBtn" class="btn btn-sub" style="background:#fab1a0;">View Today's</button>
    </div>
</div>

<div class="overlay-bg" id="overlayBg"></div>

<div class="modal" id="listModal">
    <div class="modal-header">
        <button class="close-x" onclick="closeModal('listModal')">&times;</button>
        <h3 id="modalTitle" style="margin:0 0 10px 0;">Word List</h3>
        <div style="display:flex; gap:5px;">
            <input type="text" id="listSearchInput" class="input-style" placeholder="Filter words..." style="font-size:14px;">
            <select id="sortOrder" style="border:1px solid #ddd; border-radius:10px; padding:0 5px;">
                <option value="date">Newest</option>
                <option value="abc">A-Z</option>
            </select>
        </div>
    </div>
    <div id="modalWordList"></div>
</div>

<div class="modal" id="quizModal" style="height: auto;">
    <button class="close-x" onclick="closeModal('quizModal')">&times;</button>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn btn-main active" id="modeChoice" style="flex:1;">Multiple Choice</button>
        <button class="btn btn-main" id="modeWrite" style="flex:1; background:#eee; color:#666;">Spelling Quiz</button>
    </div>
    <h3 id="quizQuestion" style="line-height:1.4; min-height:60px;"></h3>
    <div id="quizOptions"></div>
    <div id="quizWriteArea" style="display:none;">
        <input type="text" id="quizAnswerInput" class="input-style" placeholder="Type here..." autocomplete="off">
        <button id="submitAnswerBtn" class="btn btn-main" style="width:100%; margin-top:10px;">Submit (Enter)</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTVfsVWULs99Tgind1z_wqbjCJPI63Esg",
        authDomain: "my-eng-word.firebaseapp.com",
        databaseURL: "https://my-eng-word-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-eng-word",
        storageBucket: "my-eng-word.firebasestorage.app",
        messagingSenderId: "216506701187",
        appId: "1:216506701187:web:b814513e64777b35fc12b6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let vocabulary = [];
    let quizPool = [];
    let currentListView = 'all';

    document.getElementById('loginBtn').onclick = () => {
        if(document.getElementById('pwInput').value === "3346") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadData();
        } else alert("Access Denied");
    };

    function loadData() {
        db.ref('words/').on('value', (snap) => {
            const val = snap.val();
            vocabulary = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
        });
    }

    // Search Logic (Main Page)
    document.getElementById('searchBtn').onclick = async () => {
        const word = document.getElementById('wordInput').value.trim();
        if(!word) return;
        document.getElementById('resWord').innerText = word;
        document.getElementById('resKorean').value = "";
        document.getElementById('resMeaning').value = "Searching...";
        document.getElementById('searchResult').style.display = 'block';

        const links = [
            {n:'Cambridge', u:`https://dictionary.cambridge.org/dictionary/english/${word}`},
            {n:'Oxford', u:`https://www.oxfordlearnersdictionaries.com/definition/english/${word}`},
            {n:'Naver', u:`https://en.dict.naver.com/#/search?query=${word}`}
        ];
        document.getElementById('externalLinks').innerHTML = links.map(l => `<a href="${l.u}" target="_blank" class="link-tag">${l.n} ↗</a>`).join('');

        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            if(!data.title) document.getElementById('resMeaning').value = data[0].meanings[0].definitions[0].definition;
            else document.getElementById('resMeaning').value = "";
        } catch(e) { document.getElementById('resMeaning').value = ""; }
    };

    document.getElementById('saveBtn').onclick = () => {
        const word = document.getElementById('resWord').innerText;
        const meaning = document.getElementById('resMeaning').value;
        const korean = document.getElementById('resKorean').value;
        db.ref('words/').push({ word, meaning, korean, timestamp: Date.now() });
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('wordInput').value = '';
    };

    // Modal List Logic
    function openListModal(type) {
        currentListView = type;
        document.getElementById('modalTitle').innerText = type === 'all' ? "All Vocabulary" : "Today's Vocabulary";
        document.getElementById('overlayBg').style.display = 'block';
        document.getElementById('listModal').style.display = 'block';
        document.getElementById('listSearchInput').value = ''; 
        renderModalList();
    }

    function renderModalList() {
        const listEl = document.getElementById('modalWordList');
        const sort = document.getElementById('sortOrder').value;
        const filterText = document.getElementById('listSearchInput').value.toLowerCase();
        listEl.innerHTML = '';
        
        let filtered = [...vocabulary];
        if(currentListView === 'today') {
            const todayStart = new Date().setHours(0,0,0,0);
            filtered = filtered.filter(w => w.timestamp >= todayStart);
        }

        if(filterText) {
            filtered = filtered.filter(w => w.word.toLowerCase().startsWith(filterText));
        }

        if(sort === 'abc') filtered.sort((a,b) => a.word.localeCompare(b.word));
        else filtered.sort((a,b) => b.timestamp - a.timestamp);

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<div><b>${item.word}</b><br><small><span class="kor-txt">${item.korean || ''}</span> ${item.meaning}</small></div>
                             <button class="btn" onclick="deleteWord('${item.id}')" style="background:#ffeaa7; color:#d63031; font-size:11px;">Delete</button>`;
            listEl.appendChild(div);
        });
    }

    document.getElementById('listSearchInput').oninput = renderModalList;
    document.getElementById('sortOrder').onchange = renderModalList;
    document.getElementById('viewAllBtn').onclick = () => openListModal('all');
    document.getElementById('viewTodayBtn').onclick = () => openListModal('today');

    window.deleteWord = (id) => { if(confirm("Delete this word?")) db.ref('words/'+id).remove().then(() => renderModalList()); };
    window.closeModal = (id) => { 
        document.getElementById(id).style.display = 'none'; 
        document.getElementById('overlayBg').style.display = 'none'; 
    };

    // Quiz Logic
    let quizMode = 'choice';
    let currentTarget = null;

    function startQuiz(isTodayOnly) {
        const pool = isTodayOnly ? vocabulary.filter(w => w.timestamp >= new Date().setHours(0,0,0,0)) : [...vocabulary];
        if(pool.length < (isTodayOnly ? 1 : 3)) return alert("Not enough words for quiz.");
        quizPool = pool;
        document.getElementById('overlayBg').style.display = 'block';
        document.getElementById('quizModal').style.display = 'block';
        nextQuiz();
    }

    document.getElementById('startQuizBtn').onclick = () => startQuiz(false);
    document.getElementById('todayQuizBtn').onclick = () => startQuiz(true);

    function nextQuiz() {
        currentTarget = quizPool[Math.floor(Math.random()*quizPool.length)];
        document.getElementById('quizQuestion').innerText = currentTarget.meaning || currentTarget.korean;
        document.getElementById('quizAnswerInput').value = '';
        if(quizMode === 'choice') {
            document.getElementById('quizOptions').style.display = 'block';
            document.getElementById('quizWriteArea').style.display = 'none';
            let opts = [currentTarget];
            while(opts.length < Math.min(3, vocabulary.length)) {
                let r = vocabulary[Math.floor(Math.random()*vocabulary.length)];
                if(!opts.find(o=>o.word===r.word)) opts.push(r);
            }
            opts.sort(()=>Math.random()-0.5);
            document.getElementById('quizOptions').innerHTML = opts.map(o => `<button class="btn quiz-opt" onclick="checkAnswer('${o.word}')">${o.word}</button>`).join('');
        } else {
            document.getElementById('quizOptions').style.display = 'none';
            document.getElementById('quizWriteArea').style.display = 'block';
            setTimeout(() => document.getElementById('quizAnswerInput').focus(), 100);
        }
    }

    window.checkAnswer = (input) => {
        if(!input) return;
        if(input.toLowerCase().trim() === currentTarget.word.toLowerCase().trim()) { alert("Correct! 🎉"); nextQuiz(); }
        else alert(`Wrong! Correct answer: ${currentTarget.word}`);
    };

    // SUBMIT BUTTON CLICK
    document.getElementById('submitAnswerBtn').onclick = () => checkAnswer(document.getElementById('quizAnswerInput').value);

    // ENTER KEY SUBMISSION
    document.getElementById('quizAnswerInput').onkeydown = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // Prevent accidental form submission or page reload
            document.getElementById('submitAnswerBtn').click();
        }
    };

    document.getElementById('modeChoice').onclick = () => { quizMode='choice'; updateQuizBtnStyles(); nextQuiz(); };
    document.getElementById('modeWrite').onclick = () => { quizMode='write'; updateQuizBtnStyles(); nextQuiz(); };
    
    function updateQuizBtnStyles() {
        document.getElementById('modeChoice').style.background = quizMode==='choice' ? 'var(--main)' : '#eee';
        document.getElementById('modeChoice').style.color = quizMode==='choice' ? 'white' : '#666';
        document.getElementById('modeWrite').style.background = quizMode==='write' ? 'var(--main)' : '#eee';
        document.getElementById('modeWrite').style.color = quizMode==='write' ? 'white' : '#666';
    }

    document.getElementById('naverBtn').onclick = () => window.open(`https://en.dict.naver.com/#/search?query=${document.getElementById('resWord').innerText}`, 'naver', 'width=500,height=700');
</script>
</body>
</html>
