<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca & Phrase Cloud v2.1</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --accent: #00b894; --warn: #d63031; --phrase: #fdcb6e; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* Tabs */
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { cursor: pointer; font-weight: bold; color: #aaa; padding: 5px 10px; transition: 0.3s; }
        .tab.active { color: var(--main); border-bottom: 3px solid var(--main); }

        .input-style { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; transition: 0.3s; margin-bottom: 10px; }
        .input-style:focus { border-color: var(--main); outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--main); color: white; }
        .btn-phrase { background: var(--phrase); color: #2d3436; }

        /* Modal Styles */
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:20px; width:90%; max-width:480px; height: 85vh; overflow-y: auto; z-index:2000; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .close-x { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #aaa; border: none; background: none; }
        
        .item-card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #efefef; }
        .item-card b { color: var(--main); font-size: 1.1em; cursor: pointer; }
        .overlay-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; }
        
        /* Phrase Review Area */
        #phraseReviewCard { background: #fff9eb; border: 2px dashed var(--phrase); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <div class="tab active" id="tabWord" onclick="switchTab('word')">Word Search</div>
        <div class="tab" id="tabPhrase" onclick="switchTab('phrase')">Phrase Note</div>
    </div>

    <div id="wordSection">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="wordInput" class="input-style" placeholder="Enter word...">
            <button id="searchBtn" class="btn btn-main">Search</button>
        </div>
        <div id="searchResult" style="display:none; background:#f9f9ff; padding:15px; border-radius:15px; margin-bottom:15px;">
            <h3 id="resWord" style="margin:0; display:inline;"></h3> <span id="resPhonetic" style="color:var(--accent)"></span>
            <textarea id="resMeaning" class="input-style" rows="2" style="margin-top:10px;"></textarea>
            <input type="text" id="resKorean" class="input-style" placeholder="Korean Meaning">
            <button id="saveBtn" class="btn btn-main" style="width:100%;">Save Word</button>
        </div>
    </div>

    <div id="phraseSection" style="display:none;">
        <input type="text" id="phraseInput" class="input-style" placeholder="Enter English Phrase (e.g., Get over it)">
        <input type="text" id="phraseMeaningInput" class="input-style" placeholder="Meaning in Korean">
        <button id="savePhraseBtn" class="btn btn-phrase" style="width:100%;">Save Natural Phrase</button>
        
        <div id="phraseReviewCard">
            <h3 id="reviewText" style="margin:0; color: #d35400;">Press Random Review</h3>
            <p id="reviewMeaning" style="color: #7f8c8d; margin: 10px 0;"></p>
            <button class="btn btn-phrase" onclick="randomPhrase()">Next Random Phrase 🔀</button>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
        <button onclick="startQuiz()" class="btn btn-main">Word Quiz</button>
        <button onclick="showPhraseReview()" class="btn btn-phrase">Phrase Review</button>
        <button onclick="openList('word')" class="btn btn-sub">All Words</button>
        <button onclick="openList('phrase')" class="btn btn-sub" style="background:#dfe6e9;">All Phrases</button>
    </div>
</div>

<div class="overlay-bg" id="overlayBg"></div>

<div class="modal" id="listModal">
    <button class="close-x" onclick="closeModal('listModal')">&times;</button>
    <h3 id="listTitle">List</h3>
    <div id="listContent"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTVfsVWULs99Tgind1z_wqbjCJPI63Esg",
        authDomain: "my-eng-word.firebaseapp.com",
        databaseURL: "https://my-eng-word-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-eng-word",
        storageBucket: "my-eng-word.firebasestorage.app",
        messagingSenderId: "216506701187",
        appId: "1:216506701187:web:b814513e64777b35fc12b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let words = [];
    let phrases = [];

    // Load Data
    db.ref('words/').on('value', snap => {
        const val = snap.val();
        words = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
    });
    db.ref('phrases/').on('value', snap => {
        const val = snap.val();
        phrases = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
    });

    function speak(txt) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'en-US'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    function switchTab(type) {
        document.getElementById('wordSection').style.display = type === 'word' ? 'block' : 'none';
        document.getElementById('phraseSection').style.display = type === 'phrase' ? 'block' : 'none';
        document.getElementById('tabWord').className = type === 'word' ? 'tab active' : 'tab';
        document.getElementById('tabPhrase').className = type === 'phrase' ? 'tab active' : 'tab';
    }

    // Word Search
    document.getElementById('searchBtn').onclick = async () => {
        const w = document.getElementById('wordInput').value.trim();
        if(!w) return;
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
        const data = await res.json();
        document.getElementById('searchResult').style.display = 'block';
        document.getElementById('resWord').innerText = w;
        if(!data.title) {
            document.getElementById('resMeaning').value = data[0].meanings[0].definitions[0].definition;
            document.getElementById('resPhonetic').innerText = data[0].phonetic || "";
            speak(w);
        }
    };

    document.getElementById('saveBtn').onclick = () => {
        db.ref('words/').push({
            word: document.getElementById('resWord').innerText,
            meaning: document.getElementById('resMeaning').value,
            korean: document.getElementById('resKorean').value,
            phonetic: document.getElementById('resPhonetic').innerText,
            timestamp: Date.now()
        });
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('wordInput').value = '';
    };

    // Phrase Note
    document.getElementById('savePhraseBtn').onclick = () => {
        const p = document.getElementById('phraseInput').value.trim();
        const m = document.getElementById('phraseMeaningInput').value.trim();
        if(!p) return;
        db.ref('phrases/').push({ phrase: p, meaning: m, timestamp: Date.now() });
        document.getElementById('phraseInput').value = '';
        document.getElementById('phraseMeaningInput').value = '';
        alert("Phrase Saved!");
    };

    // Phrase Review Logic
    function showPhraseReview() {
        if(phrases.length === 0) return alert("Please save some phrases first!");
        switchTab('phrase');
        document.getElementById('phraseReviewCard').style.display = 'block';
        randomPhrase();
    }

    function randomPhrase() {
        const target = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('reviewText').innerText = target.phrase;
        document.getElementById('reviewMeaning').innerText = target.meaning;
        speak(target.phrase);
    }

    // List View
    function openList(type) {
        document.getElementById('listTitle').innerText = type === 'word' ? "All Words" : "All Phrases";
        const content = document.getElementById('listContent');
        content.innerHTML = '';
        const data = type === 'word' ? words : phrases;
        
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            if(type === 'word') {
                div.innerHTML = `<b onclick="speak('${item.word}')">${item.word} 🔊</b><br><small>${item.korean} | ${item.meaning}</small>`;
            } else {
                div.innerHTML = `<b onclick="speak('${item.phrase}')">${item.phrase} 🔊</b><br><small>${item.meaning}</small>`;
            }
            content.appendChild(div);
        });
        document.getElementById('overlayBg').style.display = 'block';
        document.getElementById('listModal').style.display = 'block';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.getElementById('overlayBg').style.display = 'none';
    }
</script>
</body>
</html>
