<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca & Phrase Cloud v2.3</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --accent: #00b894; --warn: #d63031; --phrase: #fdcb6e; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { cursor: pointer; font-weight: bold; color: #aaa; padding: 5px 10px; transition: 0.3s; }
        .tab.active { color: var(--main); border-bottom: 3px solid var(--main); }

        .input-style { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; transition: 0.3s; margin-bottom: 10px; }
        .input-style:focus { border-color: var(--main); outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--main); color: white; }
        .btn-sub { background: #81ecec; color: #2d3436; }
        .btn-today { background: #ff7675; color: white; }
        .btn-phrase { background: var(--phrase); color: #2d3436; }

        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:20px; width:90%; max-width:480px; height: 85vh; overflow-y: auto; z-index:2000; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .close-x { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #aaa; border: none; background: none; z-index: 2010; }
        
        .item-card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #efefef; display: flex; justify-content: space-between; align-items: center; }
        .overlay-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; }
        #resPhonetic { color: var(--accent); font-weight: bold; font-size: 0.9em; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <div class="tab active" id="tabWord" onclick="switchTab('word')">Word Mode</div>
        <div class="tab" id="tabPhrase" onclick="switchTab('phrase')">Phrase Mode</div>
    </div>

    <div id="wordSection">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="wordInput" class="input-style" placeholder="Search Word (English)">
            <button id="searchBtn" class="btn btn-main">Search</button>
        </div>
        
        <div id="searchResult" style="display:none; background:#f9f9ff; padding:15px; border-radius:15px; margin-bottom:15px;">
            <div style="display:flex; align-items:center;">
                <h3 id="resWord" style="margin:0;"></h3>
                <span id="resPhonetic"></span>
                <span style="cursor:pointer; margin-left:8px;" onclick="speak(document.getElementById('resWord').innerText)">🔊</span>
            </div>
            <textarea id="resMeaning" class="input-style" rows="2" style="margin-top:10px;"></textarea>
            <input type="text" id="resKorean" class="input-style" placeholder="Korean Meaning">
            <button id="saveBtn" class="btn btn-main" style="width:100%;">Save Word</button>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="startQuiz(false)" class="btn btn-main">All Quiz</button>
            <button onclick="startQuiz(true)" class="btn btn-today">Today's Quiz</button>
            <button onclick="openList('word')" class="btn btn-sub">View All Words</button>
            <button onclick="openList('today')" class="btn btn-sub" style="background:#fab1a0;">View Today's</button>
        </div>
    </div>

    <div id="phraseSection" style="display:none;">
        <input type="text" id="phraseInput" class="input-style" placeholder="English Phrase">
        <input type="text" id="phraseMeaningInput" class="input-style" placeholder="Korean Meaning">
        <button id="savePhraseBtn" class="btn btn-phrase" style="width:100%; margin-bottom:15px;">Save Phrase</button>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="showPhraseReview()" class="btn btn-phrase">Random Review</button>
            <button onclick="openList('phrase')" class="btn btn-sub" style="background:#dfe6e9;">All Phrases</button>
        </div>

        <div id="phraseReviewCard" style="display:none; background:#fff9eb; border:2px dashed var(--phrase); padding:20px; border-radius:15px; text-align:center; margin-top:20px;">
            <h3 id="reviewText" style="margin:0; color: #d35400;"></h3>
            <p id="reviewMeaning" style="color: #7f8c8d; margin:10px 0;"></p>
            <button class="btn btn-phrase" onclick="randomPhrase()">Next Phrase 🔀</button>
        </div>
    </div>
</div>

<div class="overlay-bg" id="overlayBg"></div>

<div class="modal" id="commonModal">
    <button class="close-x" onclick="closeModal('commonModal')">&times;</button>
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTVfsVWULs99Tgind1z_wqbjCJPI63Esg",
        authDomain: "my-eng-word.firebaseapp.com",
        databaseURL: "https://my-eng-word-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-eng-word",
        storageBucket: "my-eng-word.firebasestorage.app",
        messagingSenderId: "216506701187",
        appId: "1:216506701187:web:b814513e64777b35fc12b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let words = [];
    let phrases = [];
    let currentQuizTarget = null;
    let currentQuizPool = [];

    db.ref('words/').on('value', snap => {
        const val = snap.val();
        words = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
    });
    db.ref('phrases/').on('value', snap => {
        const val = snap.val();
        phrases = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
    });

    function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=0.9; window.speechSynthesis.speak(u); }

    function switchTab(t) {
        document.getElementById('wordSection').style.display = t==='word'?'block':'none';
        document.getElementById('phraseSection').style.display = t==='phrase'?'block':'none';
        document.getElementById('tabWord').className = t==='word'?'tab active':'tab';
        document.getElementById('tabPhrase').className = t==='phrase'?'tab active':'tab';
    }

    document.getElementById('searchBtn').onclick = async () => {
        const w = document.getElementById('wordInput').value.trim();
        if(!w) return;
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
        const data = await res.json();
        document.getElementById('searchResult').style.display = 'block';
        document.getElementById('resWord').innerText = w;
        if(!data.title) {
            document.getElementById('resMeaning').value = data[0].meanings[0].definitions[0].definition;
            document.getElementById('resPhonetic').innerText = data[0].phonetic || (data[0].phonetics.find(p=>p.text)?.text || "");
            speak(w);
        }
    };

    document.getElementById('saveBtn').onclick = () => {
        db.ref('words/').push({
            word: document.getElementById('resWord').innerText,
            meaning: document.getElementById('resMeaning').value,
            korean: document.getElementById('resKorean').value,
            phonetic: document.getElementById('resPhonetic').innerText,
            timestamp: Date.now()
        });
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('wordInput').value = '';
    };

    document.getElementById('savePhraseBtn').onclick = () => {
        const p = document.getElementById('phraseInput').value;
        const m = document.getElementById('phraseMeaningInput').value;
        if(p) db.ref('phrases/').push({ phrase: p, meaning: m, timestamp: Date.now() });
        document.getElementById('phraseInput').value = '';
        document.getElementById('phraseMeaningInput').value = '';
    };

    function openList(type) {
        document.getElementById('modalTitle').innerText = type==='word'?"All Words":type==='today'?"Today's Words":"All Phrases";
        const content = document.getElementById('modalContent');
        content.innerHTML = '';
        let data = type==='phrase' ? phrases : words;
        if(type==='today') data = words.filter(w => w.timestamp >= new Date().setHours(0,0,0,0));

        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            if(type==='phrase') {
                div.innerHTML = `<div><b onclick="speak('${item.phrase}')">${item.phrase} 🔊</b><br><small>${item.meaning}</small></div>`;
            } else {
                div.innerHTML = `<div><b onclick="speak('${item.word}')">${item.word} 🔊</b> <span style="color:var(--accent); font-size:0.8em;">${item.phonetic||''}</span><br><small>${item.korean} | ${item.meaning}</small></div>`;
            }
            content.appendChild(div);
        });
        document.getElementById('overlayBg').style.display = 'block';
        document.getElementById('commonModal').style.display = 'block';
    }

    // --- Continuous Quiz Logic ---
    function startQuiz(isToday) {
        currentQuizPool = isToday ? words.filter(w => w.timestamp >= new Date().setHours(0,0,0,0)) : words;
        if(currentQuizPool.length < 1) return alert("No words found for quiz.");
        
        document.getElementById('modalTitle').innerText = "Word Quiz Session";
        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div id="quizArea" style="text-align:center; padding: 20px 0;">
                <h2 id="qMeaning" style="margin-bottom:20px; color: var(--main);"></h2>
                <input type="text" id="qInput" class="input-style" placeholder="Type the English spelling..." autocomplete="off" style="text-align:center;">
                <button onclick="checkQuiz()" class="btn btn-main" style="width:100%; margin-top: 10px;">Check Answer</button>
                <button onclick="closeModal('commonModal')" class="btn" style="width:100%; margin-top: 10px; background:#eee;">Finish & Exit</button>
            </div>`;
        
        document.getElementById('overlayBg').style.display = 'block';
        document.getElementById('commonModal').style.display = 'block';
        
        loadNextQuestion();
    }

    function loadNextQuestion() {
        currentQuizTarget = currentQuizPool[Math.floor(Math.random()*currentQuizPool.length)];
        document.getElementById('qMeaning').innerText = currentQuizTarget.korean || currentQuizTarget.meaning;
        const input = document.getElementById('qInput');
        input.value = '';
        input.focus();
        input.onkeydown = (e) => { if(e.key==='Enter') checkQuiz(); };
    }

    function checkQuiz() {
        const inputField = document.getElementById('qInput');
        const userInput = inputField.value.trim().toLowerCase();
        
        if(userInput === currentQuizTarget.word.toLowerCase()) {
            speak(currentQuizTarget.word);
            // Visual feedback instead of alert for better flow
            inputField.style.borderColor = "var(--accent)";
            setTimeout(() => {
                inputField.style.borderColor = "#eee";
                loadNextQuestion();
            }, 600);
        } else {
            inputField.style.borderColor = "var(--warn)";
            alert(`Not quite! The answer was: ${currentQuizTarget.word}`);
            inputField.style.borderColor = "#eee";
            loadNextQuestion(); // Move to next even if wrong
        }
    }

    function showPhraseReview() {
        if(phrases.length < 1) return alert("Save some phrases first.");
        document.getElementById('phraseReviewCard').style.display = 'block';
        randomPhrase();
    }

    function randomPhrase() {
        const target = phrases[Math.floor(Math.random()*phrases.length)];
        document.getElementById('reviewText').innerText = target.phrase;
        document.getElementById('reviewMeaning').innerText = target.meaning;
        speak(target.phrase);
    }

    function closeModal(id) { 
        document.getElementById(id).style.display='none'; 
        document.getElementById('overlayBg').style.display='none'; 
    }
</script>
</body>
</html>
