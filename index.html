<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Voca - Today's Quiz</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --accent: #00b894; --warn: #d63031; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        #authOverlay { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .input-style { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--main); color: white; }
        .btn-today { background: #ff7675; color: white; }
        #searchResult { background: #f9f9ff; padding: 20px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #e0e0ff; }
        .word-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        #quizArea { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:20px; width:85%; max-width:400px; z-index:1500; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .quiz-opt { width:100%; margin:8px 0; text-align:left; background: #f8f9fa; border: 1px solid #eee; }
        .quiz-type-btn { flex: 1; padding: 10px; border: 1px solid var(--main); background: white; color: var(--main); border-radius: 8px; }
        .quiz-type-btn.active { background: var(--main); color: white; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h2>🔒 Access Pin</h2>
    <input type="password" id="pwInput" class="input-style" style="width:200px; text-align:center" placeholder="비밀번호">
    <button id="loginBtn" class="btn btn-main" style="margin-top:15px; width:200px;">접속하기</button>
</div>

<div class="container" id="mainApp" style="display:none;">
    <h2 style="text-align:center; color: var(--main); margin-top:0;">My Voca Cloud</h2>
    
    <div style="display:flex; gap:8px; margin-bottom:20px;">
        <input type="text" id="wordInput" class="input-style" placeholder="단어 입력">
        <button id="searchBtn" class="btn btn-main">검색</button>
    </div>

    <div id="searchResult">
        <h3 id="resWord" style="margin:0; color:var(--main)"></h3>
        <p id="resPhonetic" style="color:#aaa; font-size: 14px;"></p>
        <textarea id="resMeaning" class="input-style" rows="3" style="margin-bottom:10px; resize:none; font-size:14px;"></textarea>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="text" id="resKorean" class="input-style" placeholder="한글 뜻">
            <button id="naverBtn" class="btn" style="background:#03cf5d; color:white;">네이버</button>
        </div>
        <button id="saveBtn" class="btn btn-main" style="width:100%;">저장</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="startQuizBtn" class="btn btn-main" style="flex:1;">전체 퀴즈</button>
        <button id="todayQuizBtn" class="btn btn-today" style="flex:1;">오늘의 퀴즈</button>
    </div>

    <div id="wordList"></div>
</div>

<div id="quizArea">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="quiz-type-btn active" id="modeChoice">객관식</button>
        <button class="quiz-type-btn" id="modeWrite">주관식</button>
    </div>
    <div id="quizContent">
        <p id="quizTypeLabel" style="color:#666; font-size:12px; margin-bottom:5px;">의미를 보고 단어를 맞추세요</p>
        <h3 id="quizQuestion" style="margin-bottom:20px; line-height:1.4; font-size: 18px; color: #333;"></h3>
        <div id="quizOptions"></div>
        <div id="quizWriteArea" style="display:none;">
            <input type="text" id="quizAnswerInput" class="input-style" placeholder="단어 입력" autocomplete="off">
            <button id="submitAnswerBtn" class="btn btn-main" style="width:100%; margin-top:10px;">확인</button>
        </div>
    </div>
    <button id="closeQuizBtn" class="btn" style="width:100%; margin-top:20px; background:#eee;">닫기</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTVfsVWULs99Tgind1z_wqbjCJPI63Esg",
        authDomain: "my-eng-word.firebaseapp.com",
        databaseURL: "https://my-eng-word-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-eng-word",
        storageBucket: "my-eng-word.firebasestorage.app",
        messagingSenderId: "216506701187",
        appId: "1:216506701187:web:b814513e64777b35fc12b6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let vocabulary = [];
    let quizPool = []; 
    let quizMode = 'choice'; 
    let currentTarget = null;

    document.getElementById('loginBtn').onclick = () => {
        if(document.getElementById('pwInput').value === "3346") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadData();
        } else alert("Error");
    };

    function loadData() {
        db.ref('words/').on('value', (snap) => {
            const val = snap.val();
            vocabulary = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
            renderList();
        });
    }

    document.getElementById('searchBtn').onclick = async () => {
        const word = document.getElementById('wordInput').value.trim();
        if(!word) return;
        document.getElementById('resWord').innerText = word;
        document.getElementById('resKorean').value = ""; 
        document.getElementById('resMeaning').value = "Searching...";
        document.getElementById('searchResult').style.display = 'block';
        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            if(!data.title) {
                document.getElementById('resMeaning').value = data[0].meanings[0].definitions[0].definition;
                document.getElementById('resPhonetic').innerText = data[0].phonetic || "";
            } else { document.getElementById('resMeaning').value = ""; }
        } catch(e) { document.getElementById('resMeaning').value = ""; }
    };

    document.getElementById('saveBtn').onclick = () => {
        const word = document.getElementById('resWord').innerText;
        const meaning = document.getElementById('resMeaning').value;
        const korean = document.getElementById('resKorean').value;
        const phonetic = document.getElementById('resPhonetic').innerText;
        db.ref('words/').push({ word, meaning, korean, phonetic, timestamp: Date.now() });
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('wordInput').value = '';
    };

    function renderList() {
        const list = document.getElementById('wordList');
        list.innerHTML = '';
        [...vocabulary].reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<div><b>${item.word}</b><br><small>${item.korean || ''} ${item.meaning}</small></div>
                             <button class="btn" onclick="deleteWord('${item.id}')" style="background:#ffeaa7; color:#d63031; font-size:11px;">삭제</button>`;
            list.appendChild(div);
        });
    }
    window.deleteWord = (id) => { if(confirm("삭제?")) db.ref('words/'+id).remove(); };

    // --- 퀴즈 로직 (오늘의 단어 필터링) ---
    function startQuiz(isTodayOnly) {
        if(isTodayOnly) {
            const todayStart = new Date().setHours(0,0,0,0);
            quizPool = vocabulary.filter(w => w.timestamp >= todayStart);
            if(quizPool.length < 1) return alert("오늘 등록한 단어가 없습니다.");
        } else {
            quizPool = [...vocabulary];
            if(quizPool.length < 3) return alert("단어를 3개 이상 등록해주세요.");
        }
        document.getElementById('quizArea').style.display = 'block';
        nextQuiz();
    }

    document.getElementById('startQuizBtn').onclick = () => startQuiz(false);
    document.getElementById('todayQuizBtn').onclick = () => startQuiz(true);

    function nextQuiz() {
        currentTarget = quizPool[Math.floor(Math.random()*quizPool.length)];
        // 영어 뜻을 먼저 보여주고, 없으면 한글 뜻 노출
        document.getElementById('quizQuestion').innerText = currentTarget.meaning || currentTarget.korean;
        document.getElementById('quizAnswerInput').value = '';
        
        if(quizMode === 'choice') {
            document.getElementById('quizOptions').style.display = 'block';
            document.getElementById('quizWriteArea').style.display = 'none';
            let opts = [currentTarget];
            let allOptions = vocabulary.length >= 3 ? vocabulary : quizPool;
            while(opts.length < Math.min(3, allOptions.length)) {
                let r = allOptions[Math.floor(Math.random()*allOptions.length)];
                if(!opts.find(o=>o.word===r.word)) opts.push(r);
            }
            opts.sort(()=>Math.random()-0.5);
            document.getElementById('quizOptions').innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn quiz-opt';
                b.innerText = o.word;
                b.onclick = () => checkAnswer(o.word);
                document.getElementById('quizOptions').appendChild(b);
            });
        } else {
            document.getElementById('quizOptions').style.display = 'none';
            document.getElementById('quizWriteArea').style.display = 'block';
            document.getElementById('quizAnswerInput').focus();
        }
    }

    function checkAnswer(input) {
        if(input.toLowerCase().trim() === currentTarget.word.toLowerCase().trim()) {
            alert("정답입니다! 🎉");
            nextQuiz();
        } else {
            alert(`오답! 정답은 [ ${currentTarget.word} ]\n뜻: ${currentTarget.korean || ''}`);
            nextQuiz();
        }
    }

    document.getElementById('submitAnswerBtn').onclick = () => checkAnswer(document.getElementById('quizAnswerInput').value);
    document.getElementById('quizAnswerInput').onkeyup = (e) => { if(e.key==='Enter') document.getElementById('submitAnswerBtn').click(); };
    document.getElementById('modeChoice').onclick = () => { quizMode='choice'; document.getElementById('modeChoice').classList.add('active'); document.getElementById('modeWrite').classList.remove('active'); nextQuiz(); };
    document.getElementById('modeWrite').onclick = () => { quizMode='write'; document.getElementById('modeWrite').classList.add('active'); document.getElementById('modeChoice').classList.remove('active'); nextQuiz(); };
    document.getElementById('closeQuizBtn').onclick = () => document.getElementById('quizArea').style.display='none';
    document.getElementById('naverBtn').onclick = () => window.open(`https://en.dict.naver.com/#/search?query=${document.getElementById('resWord').innerText}`, 'naver', 'width=500,height=700');
</script>
</body>
</html>
