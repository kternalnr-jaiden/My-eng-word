<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Voca App</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --accent: #00b894; --warn: #d63031; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        #authOverlay { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .input-style { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; transition: 0.3s; width: 100%; box-sizing: border-box; }
        .input-style:focus { border-color: var(--main); outline: none; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
        .btn-main { background: var(--main); color: white; }
        .btn-naver { background: #03cf5d; color: white; }
        .btn-del { background: #ffeaa7; color: #d63031; padding: 5px 10px; }
        
        #searchResult { background: #f9f9ff; padding: 20px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #e0e0ff; }
        .word-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        
        /* 퀴즈 팝업 레이아웃 */
        #quizArea { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:20px; width:85%; max-width:400px; z-index:1500; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .quiz-opt { width:100%; margin:8px 0; text-align:left; background: #f8f9fa; border: 1px solid #eee; }
        .quiz-type-btn { flex: 1; padding: 10px; border: 1px solid var(--main); background: white; color: var(--main); border-radius: 8px; cursor: pointer; }
        .quiz-type-btn.active { background: var(--main); color: white; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h2 style="margin-bottom:20px;">🔒 Voca App</h2>
    <input type="password" id="pwInput" class="input-style" style="width:200px; text-align:center" placeholder="비밀번호">
    <button id="loginBtn" class="btn btn-main" style="margin-top:15px; width:200px;">접속하기</button>
</div>

<div class="container" id="mainApp" style="display:none;">
    <h2 style="text-align:center; color: var(--main);">My Cloud Dictionary</h2>
    
    <div style="display:flex; gap:8px; margin-bottom:20px;">
        <input type="text" id="wordInput" class="input-style" placeholder="Search Word">
        <button id="searchBtn" class="btn btn-main">검색</button>
    </div>

    <div id="searchResult">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="resWord" style="margin:0; color:var(--main)"></h3>
            <span id="resPhonetic" style="color:#aaa"></span>
        </div>
        <div id="externalLinks" style="margin: 10px 0;"></div>
        <textarea id="resMeaning" class="input-style" rows="3" style="margin-bottom:10px; resize:none;"></textarea>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="text" id="resKorean" class="input-style" placeholder="한글 뜻 또는 메모">
            <button id="naverBtn" class="btn btn-naver">네이버</button>
        </div>
        <button id="saveBtn" class="btn btn-main" style="width:100%;">저장하기</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <select id="sortOrder" style="border:none; background:transparent; font-weight:bold;">
            <option value="date">최신순</option>
            <option value="abc">알파벳순</option>
        </select>
        <button id="startQuizBtn" class="btn" style="background:var(--accent); color:white;">Quiz Start</button>
    </div>

    <div id="wordList"></div>
</div>

<div id="quizArea">
    <div id="quizTypeSelect" style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="quiz-type-btn active" id="modeChoice">객관식</button>
        <button class="quiz-type-btn" id="modeWrite">주관식</button>
    </div>
    <div id="quizContent">
        <p style="color:#666; font-size:12px; margin-bottom:5px;">다음 뜻을 가진 단어는?</p>
        <h3 id="quizQuestion" style="margin-bottom:20px; word-break: keep-all; line-height: 1.4;"></h3>
        <div id="quizOptions"></div> <div id="quizWriteArea" style="display:none;"> <input type="text" id="quizAnswerInput" class="input-style" placeholder="단어를 입력하세요" autocomplete="off">
            <button id="submitAnswerBtn" class="btn btn-main" style="width:100%; margin-top:10px;">정답 확인</button>
        </div>
    </div>
    <button id="closeQuizBtn" class="btn" style="width:100%; margin-top:20px; background:#eee;">닫기</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTVfsVWULs99Tgind1z_wqbjCJPI63Esg",
        authDomain: "my-eng-word.firebaseapp.com",
        databaseURL: "https://my-eng-word-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-eng-word",
        storageBucket: "my-eng-word.firebasestorage.app",
        messagingSenderId: "216506701187",
        appId: "1:216506701187:web:b814513e64777b35fc12b6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let vocabulary = [];
    let quizMode = 'choice'; // 'choice' or 'write'

    // 로그인
    document.getElementById('loginBtn').onclick = () => {
        if(document.getElementById('pwInput').value === "3346") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadData();
        } else alert("비밀번호 오류");
    };

    function loadData() {
        db.ref('words/').on('value', (snap) => {
            const val = snap.val();
            vocabulary = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
            renderList();
        });
    }

// 단어 검색 버튼 클릭 시 로직 수정
document.getElementById('searchBtn').onclick = async () => {
    const word = document.getElementById('wordInput').value.trim();
    if(!word) return;

    // --- [추가] 이전 검색 결과 초기화 ---
    document.getElementById('resWord').innerText = word;
    document.getElementById('resPhonetic').innerText = ""; // 발음기호 초기화
    document.getElementById('resMeaning').value = "검색 중..."; // 영영뜻 초기화
    document.getElementById('resKorean').value = ""; // 한글 뜻 입력칸 초기화 (이 부분!)
    document.getElementById('searchResult').style.display = 'block';
    // ------------------------------------

    updateLinks(word); // 외부 사전 링크 업데이트

    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        const data = await res.json();
        
        if(!data.title) {
            const entry = data[0];
            document.getElementById('resPhonetic').innerText = entry.phonetic || (entry.phonetics[0] ? entry.phonetics[0].text : "");
            document.getElementById('resMeaning').value = entry.meanings[0].definitions[0].definition;
        } else {
            document.getElementById('resMeaning').value = "기본 사전에 뜻이 없습니다. 외부 링크를 확인하고 직접 입력해주세요.";
        }
    } catch(e) {
        document.getElementById('resMeaning').value = "네트워크 오류가 발생했습니다. 직접 입력을 권장합니다.";
    }
};

    document.getElementById('saveBtn').onclick = () => {
        const word = document.getElementById('resWord').innerText;
        const meaning = document.getElementById('resMeaning').value;
        const korean = document.getElementById('resKorean').value;
        const phonetic = document.getElementById('resPhonetic').innerText;
        db.ref('words/').push({ word, meaning, korean, phonetic, timestamp: Date.now() });
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('wordInput').value = '';
    };

    function renderList() {
        const list = document.getElementById('wordList');
        const sort = document.getElementById('sortOrder').value;
        list.innerHTML = '';
        let sorted = [...vocabulary];
        if(sort === 'abc') sorted.sort((a,b) => a.word.localeCompare(b.word));
        else sorted.sort((a,b) => b.timestamp - a.timestamp);
        sorted.forEach(item => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<div><b>${item.word}</b><br><small>${item.korean ? '['+item.korean+'] ' : ''}${item.meaning}</small></div>
                             <button class="btn btn-del" onclick="deleteWord('${item.id}')">삭제</button>`;
            list.appendChild(div);
        });
    }
    window.deleteWord = (id) => { if(confirm("삭제하시겠습니까?")) db.ref('words/'+id).remove(); };

    // --- 퀴즈 로직 강화 ---
    document.getElementById('startQuizBtn').onclick = () => {
        if(vocabulary.length < 3) return alert("단어를 3개 이상 등록해주세요.");
        document.getElementById('quizArea').style.display = 'block';
        nextQuiz();
    };

    document.getElementById('modeChoice').onclick = function() {
        quizMode = 'choice';
        this.classList.add('active');
        document.getElementById('modeWrite').classList.remove('active');
        nextQuiz();
    };

    document.getElementById('modeWrite').onclick = function() {
        quizMode = 'write';
        this.classList.add('active');
        document.getElementById('modeChoice').classList.remove('active');
        nextQuiz();
    };

    let currentTarget = null;

    function nextQuiz() {
        currentTarget = vocabulary[Math.floor(Math.random()*vocabulary.length)];
        document.getElementById('quizQuestion').innerText = currentTarget.korean || currentTarget.meaning;
        document.getElementById('quizAnswerInput').value = '';
        
        if(quizMode === 'choice') {
            document.getElementById('quizOptions').style.display = 'block';
            document.getElementById('quizWriteArea').style.display = 'none';
            let opts = [currentTarget];
            while(opts.length < 3) {
                let r = vocabulary[Math.floor(Math.random()*vocabulary.length)];
                if(!opts.find(o=>o.id===r.id)) opts.push(r);
            }
            opts.sort(()=>Math.random()-0.5);
            document.getElementById('quizOptions').innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn quiz-opt';
                b.innerText = o.word; // 객관식은 단어를 선택
                b.onclick = () => checkAnswer(o.word);
                document.getElementById('quizOptions').appendChild(b);
            });
        } else {
            document.getElementById('quizOptions').style.display = 'none';
            document.getElementById('quizWriteArea').style.display = 'block';
            document.getElementById('quizAnswerInput').focus();
        }
    }

    function checkAnswer(input) {
        if(input.toLowerCase().trim() === currentTarget.word.toLowerCase().trim()) {
            alert("정답입니다! 🎉");
            nextQuiz();
        } else {
            alert(`틀렸습니다. 정답은 [ ${currentTarget.word} ] 입니다.`);
            nextQuiz();
        }
    }

    document.getElementById('submitAnswerBtn').onclick = () => {
        const val = document.getElementById('quizAnswerInput').value;
        if(!val) return;
        checkAnswer(val);
    };

    // 엔터키 입력 시 정답 확인
    document.getElementById('quizAnswerInput').onkeypress = (e) => {
        if(e.key === 'Enter') document.getElementById('submitAnswerBtn').click();
    };

    document.getElementById('closeQuizBtn').onclick = () => {
        document.getElementById('quizArea').style.display = 'none';
    };
    
    document.getElementById('naverBtn').onclick = () => {
        window.open(`https://en.dict.naver.com/#/search?query=${document.getElementById('resWord').innerText}`, 'naver', 'width=500,height=700');
    };
</script>
</body>
</html>
